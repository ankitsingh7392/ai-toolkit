# IMPORTANT: Replace placeholder values before applying.
# Use `kubectl create secret` or a secrets manager (Vault, AWS Secrets Manager, etc.)
# in production rather than committing real values here.
#
# To create from CLI instead:
#   kubectl -n failsage create secret generic failsage-secrets \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-... \
#     --from-literal=POSTGRES_PASSWORD=<strong-password> \
#     --from-literal=SLACK_WEBHOOK_URL=https://hooks.slack.com/... \
#     --from-literal=JIRA_URL=https://yourorg.atlassian.net \
#     --from-literal=JIRA_TOKEN=<your-jira-token>
apiVersion: v1
kind: Secret
metadata:
  name: failsage-secrets
  namespace: failsage
type: Opaque
stringData:
  ANTHROPIC_API_KEY: ""          # Leave blank to use mock mode
  POSTGRES_PASSWORD: "failsage"  # Change in production
  SLACK_WEBHOOK_URL: ""
  JIRA_URL: ""
  JIRA_TOKEN: ""
