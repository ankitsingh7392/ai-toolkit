name: PR Title Check

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read
  statuses: write

jobs:
  check-title:
    name: Conventional Commits Title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            test
            chore
            ci
            perf
            revert
            build
          requireScope: false
          subjectPattern: ^[a-z].+[^.]$
          subjectPatternError: |
            The PR title must:
              - start with a lowercase letter
              - not end with a period
            Example: "feat(rag): add hybrid search pipeline"
          wip: true
          validateSingleCommit: false
